# ==================== Nginx 配置文件 ====================
# 将此文件内容放入你的 Nginx 配置中
# 推荐路径：/etc/nginx/conf.d/lylmew.conf

server {
    listen 80;
    # 替换为你的域名
    server_name www.lylmew.com;

    # 网站根目录指向 public/
    root /path/to/lylmew/public;
    index index.php index.html;

    # 日志
    access_log /var/log/nginx/lylmew_access.log;
    error_log  /var/log/nginx/lylmew_error.log;

    # 客户端请求体大小限制（文件上传）
    client_max_body_size 20M;

    # 伪静态规则 - ThinkPHP
    location / {
        # 对于 /admin/ 及其子路径，强制走 index.php 路由（避免 public/admin/ 目录冲突）
        if ($uri ~ ^/admin(/.*)?$) {
            rewrite ^(.*)$ /index.php?s=$1 last;
            break;
        }
        if (!-e $request_filename) {
            rewrite ^(.*)$ /index.php?s=$1 last;
            break;
        }
    }

    # PHP解析
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }

    # 禁止访问敏感文件
    location ~ /\.(ht|git|svn|env) {
        deny all;
        return 404;
    }

    # 禁止直接访问 runtime 目录
    location ^~ /runtime/ {
        deny all;
        return 404;
    }

    # 禁止直接访问 app 目录
    location ^~ /app/ {
        deny all;
        return 404;
    }

    # 静态资源缓存 7天
    location ~* \.(jpg|jpeg|png|gif|webp|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # 上传目录允许直接访问
    location ^~ /static/uploads/ {
        expires 30d;
    }

    # Gzip 压缩
    gzip on;
    gzip_min_length 1000;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
}

