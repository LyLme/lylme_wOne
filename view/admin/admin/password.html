{extend name="admin/layout" /}

{block name="content"}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white">
                <h5 class="mb-0"><i class="fa fa-key text-primary me-2"></i>修改密码</h5>
            </div>
            <div class="card-body">
                <form id="passwordForm">
                    <div class="mb-3">
                        <label class="form-label">原密码 <span class="text-danger">*</span></label>
                        <input type="password" name="old_password" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">新密码 <span class="text-danger">*</span></label>
                        <input type="password" name="new_password" class="form-control" required minlength="6">
                        <small class="text-muted">至少6位字符</small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">确认新密码 <span class="text-danger">*</span></label>
                        <input type="password" name="confirm_password" class="form-control" required minlength="6">
                    </div>
                    <div class="text-end">
                        <button type="submit" class="btn btn-primary" id="saveBtn"><i class="fa fa-save"></i> 保存修改</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{/block}

{block name="js"}
<script>
(function() {
    $('#passwordForm').on('submit', function(e) {
        e.preventDefault();
        var btn = $('#saveBtn');
        var data = {
            old_password: $('input[name="old_password"]').val(),
            new_password: $('input[name="new_password"]').val(),
            confirm_password: $('input[name="confirm_password"]').val()
        };
        if (data.new_password !== data.confirm_password) {
            return alert('两次输入的新密码不一致');
        }
        if (data.new_password.length < 6) {
            return alert('新密码至少6位');
        }

        btn.prop('disabled', true).html('<i class="fa fa-spinner fa-spin"></i> 保存中');
        $.post('/admin/admin-user/password', data, function(res) {
            btn.prop('disabled', false).html('<i class="fa fa-save"></i> 保存修改');
            alert(res.msg);
            if (res.code === 0) {
                setTimeout(function() {
                    window.location.href = '/admin/logout';
                }, 1000);
            }
        }, 'json').fail(function() {
            btn.prop('disabled', false).html('<i class="fa fa-save"></i> 保存修改');
            alert('请求失败');
        });
    });
})();
</script>
{/block}
